name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble test profile
        run: bash ./build.sh test

      - name: Run unit tests
        run: bash ./test/unit/run-tests.sh

  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # assemble target/ so the generated scripts get linted too
      - name: Assemble test profile
        run: bash ./build.sh test

      - name: Run ShellCheck
        run: |
          shellcheck --version >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y shellcheck)
          # Lint at warning severity. The excluded codes are inherent to this
          # codebase's design, not bugs:
          #   SC1090/SC1091 - dynamic 'source <(...)' can't be followed
          #   SC2034/SC2154 - vars are set and used across separately-sourced
          #                   files (os-params / *-data.sh), so "unused" /
          #                   "referenced but not assigned" are false positives
          #   SC2091/SC2046 - the installer intentionally builds a command
          #                   string with printf and runs it via $(...)
          shellcheck --severity=warning -e SC1090,SC1091,SC2034,SC2154,SC2091,SC2046 \
            build.sh \
            test/*.sh \
            test/container-scripts/*.sh \
            test/unit/run-tests.sh \
            test/unit/assert.sh \
            test/unit/cases/*.sh \
            $(find target -name '*.sh')
